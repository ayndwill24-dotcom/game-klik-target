<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Klik Target</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Game Klik Target</h1>

    <div class="info">
      <p>Skor: <span id="score">0</span></p>
      <p>Waktu: <span id="time">15</span> detik</p>
      <p>Rekor: <span id="best">0</span></p>
    </div>

    <button id="startBtn">Mulai Game</button>
    <p id="status">Tekan tombol mulai untuk bermain.</p>

    <div class="arena" id="arena">
      <button id="target" class="target" hidden>🎯</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
